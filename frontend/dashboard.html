<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPeek — Dashboard</title>
  <!-- All styles from style.css — no inline styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Top navigation bar -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">i</div>
      Research Repository
    </div>
    <div class="nav-links">
      <a class="nav-link active" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="review.html">Review Queue</a>
      <a class="nav-link" href="browse.html">Browse</a>
      <a class="nav-link" href="upload.html">Upload</a>
    </div>
    <div class="nav-right">
      <!-- Avatar initials — filled by dashboard.js -->
      <div class="avatar" id="avatarEl"></div>
      <!-- Role label — filled by dashboard.js -->
      <span class="role-pill" id="rolePill"></span>
    </div>
  </nav>

  <!-- Page body -->
  <div class="main">

    <!-- Greeting -->
    <div style="margin-bottom:20px;">
      <p class="text-muted" style="font-size:0.8rem;">Good morning,</p>
      <!-- User's name — filled by dashboard.js -->
      <h2 id="greeting"></h2>
    </div>

    <!-- Stat cards row -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-lbl">Total Research</div>
      </div>
      <div class="stat-card hi">
        <div class="stat-num" id="statPending">—</div>
        <div class="stat-lbl">Pending Review</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statValidated">—</div>
        <div class="stat-lbl">Validated</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statRejected">—</div>
        <div class="stat-lbl">Rejected</div>
      </div>
    </div>

    <!-- Bottom two-column section -->
    <div class="dash-grid">

      <!-- Recent submissions list -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <h3>Recent Submissions</h3>
          <a href="review.html" style="font-size:0.78rem;color:var(--info);">View all →</a>
        </div>
        <!-- Populated by dashboard.js -->
        <div id="recentList"></div>
      </div>

      <!-- Quick actions panel -->
      <div class="card">
        <h3 style="margin-bottom:14px;">Quick Actions</h3>

        <!-- Action required alert -->
        <div class="action-alert">
          <div class="action-alert-title">Action Required</div>
          <!-- Pending count message — filled by dashboard.js -->
          <div class="action-alert-body" id="pendingMsg">Loading...</div>
        </div>

        <!-- Quick action buttons grid -->
        <div class="quick-actions">
          <button class="btn btn-primary" onclick="location.href='review.html'">✅ Validate Research</button>
          <button class="btn btn-ghost"   onclick="location.href='upload.html'">📤 Upload Study</button>
          <button class="btn btn-ghost"   onclick="location.href='browse.html'">🔍 Search Repo</button>
          <button class="btn btn-ghost"   onclick="location.href='profile.html'">👤 Edit Profile</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast notification container -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- Shared API layer -->
  <script src="js/api.js"></script>
  <!-- Dashboard page logic -->
  <script src="js/dashboard.js"></script>

</body>
</html>

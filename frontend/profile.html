<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPeek — Profile</title>
  <!-- All styles from style.css — no inline styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Top navigation bar -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">i</div>
      Research Repository
    </div>
    <div class="nav-links">
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="review.html">Review Queue</a>
      <a class="nav-link" href="browse.html">Browse</a>
      <a class="nav-link" href="upload.html">Upload</a>
    </div>
    <div class="nav-right">
      <!-- Avatar and role pill filled by profile.js -->
      <a href="profile.html" class="avatar" id="avatarEl" title="View Profile"></a>
      <span class="role-pill" id="rolePill"></span>
    </div>
  </nav>

  <!-- Centered two-column profile layout -->
  <div class="profile-layout">

    <!-- Left column: avatar card -->
    <div>
      <div class="profile-avatar-card">

        <!-- Large avatar circle with edit overlay -->
        <div class="avatar-large" id="avatarLarge" title="Click to change photo">
          <!-- Initials filled by profile.js -->
          <span id="avatarInitials"></span>
          <div class="avatar-edit">✏️</div>
        </div>

        <!-- Display name and email — filled by profile.js -->
        <div class="profile-name"  id="profileName"></div>
        <div class="profile-email" id="profileEmail"></div>

        <!-- Role badge -->
        <span class="role-pill" id="profileRolePill"></span>

        <!-- Meta info: university, ID, member since, papers count -->
        <div class="profile-meta">
          <div class="profile-meta-item">
            🏛️ <strong id="metaUniv">ISAT-U</strong>
          </div>
          <div class="profile-meta-item">
            🪪 <strong id="metaId">—</strong>
          </div>
          <div class="profile-meta-item">
            📅 <strong>Member since 2019</strong>
          </div>
          <div class="profile-meta-item">
            📄 <strong id="metaPapers">0</strong> validated papers
          </div>
        </div>

      </div>
    </div>

    <!-- Right column: settings form -->
    <div>
      <div class="profile-form-card">

        <!-- Personal Information section -->
        <div class="section-title">Personal Information</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input class="form-input" id="firstName" placeholder="First name">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input class="form-input" id="lastName" placeholder="Last name">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-input" id="email" type="email" placeholder="email@isat-u.edu.ph">
          </div>
          <div class="form-group">
            <label class="form-label">Contact Number</label>
            <input class="form-input" id="contact" placeholder="+63 9XX XXX XXXX">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Department</label>
          <select class="form-input" id="department">
            <option>Library Services</option>
            <option>College of Engineering</option>
            <option>College of Computing</option>
            <option>College of Arts &amp; Sciences</option>
            <option>IT Department</option>
          </select>
        </div>

        <!-- Divider between sections -->
        <hr class="divider">

        <!-- Change Password section -->
        <div class="section-title">Change Password</div>

        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input class="form-input" id="currentPw" type="password" placeholder="Enter current password">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input class="form-input" id="newPw" type="password"
                   placeholder="Min. 8 characters"
                   oninput="checkStrength(this.value)">
            <!-- Password strength indicator bar -->
            <div class="pw-bar">
              <div class="pw-fill" id="pwFill" style="width:0%;"></div>
            </div>
            <!-- Strength label: Weak / Medium / Strong -->
            <div class="pw-label" id="pwLabel"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input class="form-input" id="confirmPw" type="password" placeholder="Repeat new password">
          </div>
        </div>

        <!-- Save / Cancel buttons -->
        <div class="form-actions-right">
          <button class="btn btn-ghost" onclick="cancelChanges()">Cancel</button>
          <button class="btn btn-primary" onclick="saveChanges()">Save Changes</button>
        </div>

      </div>
    </div>

  </div>

  <!-- Toast notification container -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- Shared API layer -->
  <script src="js/api.js"></script>
  <!-- Profile page logic -->
  <script src="js/profile.js"></script>

</body>
</html>

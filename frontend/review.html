<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPeek — Review Queue</title>
  <!-- All styles from style.css — no inline styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Top navigation bar -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">i</div>
      Research Repository
    </div>
    <div class="nav-links">
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link active" href="review.html">Review Queue</a>
      <a class="nav-link" href="browse.html">Browse</a>
      <a class="nav-link" href="upload.html">Upload</a>
    </div>
    <div class="nav-right">
      <!-- Avatar and role pill filled by review.js -->
      <div class="avatar" id="avatarEl"></div>
      <span class="role-pill" id="rolePill"></span>
    </div>
  </nav>

  <!-- Two-column review layout: submission list | detail view -->
  <div class="layout-review">

    <!-- Left panel: submission list -->
    <div class="sub-panel">

      <!-- Panel header: title, search, filter tabs -->
      <div class="sub-panel-header">
        <h3>Submissions for Review</h3>

        <!-- Search submissions by title or author -->
        <div class="search-wrap" style="margin-bottom:10px;">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search pending research...">
        </div>

        <!-- Filter tabs: All | Pending | Returned -->
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterList('all',this)">
            All (<span id="cntAll">0</span>)
          </button>
          <button class="filter-tab" onclick="filterList('pending',this)">
            Pending (<span id="cntPending">0</span>)
          </button>
          <button class="filter-tab" onclick="filterList('returned',this)">
            Returned (<span id="cntReturned">0</span>)
          </button>
        </div>
      </div>

      <!-- Scrollable list of submission cards — populated by review.js -->
      <div class="sub-list" id="subList"></div>

    </div>

    <!-- Right panel: detail view of selected submission -->
    <!-- Initially shows an empty state prompt — replaced by review.js when a card is clicked -->
    <div class="detail-panel" id="detailPanel">
      <div class="empty-detail">
        <div class="icon">📋</div>
        <p style="font-weight:600;margin-bottom:4px;">No submission selected</p>
        <p style="font-size:0.8rem;">Click a submission on the left to review it.</p>
      </div>
    </div>

  </div>

  <!-- Toast notification container -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- Shared API layer -->
  <script src="js/api.js"></script>
  <!-- Review queue logic -->
  <script src="js/review.js"></script>

</body>
</html>

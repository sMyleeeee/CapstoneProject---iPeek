<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPeek — Review Queue</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .review-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 52px);
    }

    /* Left panel — submission list */
    .sub-panel {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sub-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sub-panel-header h3 { font-size: 0.92rem; margin-bottom: 10px; }

    .filter-tabs {
      display: flex; gap: 4px;
      background: var(--bg); padding: 3px;
      border-radius: 7px;
    }

    .filter-tab {
      flex: 1; text-align: center; padding: 5px;
      border-radius: 5px; font-size: 0.76rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border: none; background: transparent; transition: all 0.15s;
    }

    .filter-tab.active { background: white; color: var(--primary); box-shadow: var(--shadow); }

    .sub-list {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .sub-item {
      padding: 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: white;
      cursor: pointer; transition: all 0.15s;
    }

    .sub-item:hover  { border-color: #c7d2fe; background: #f8f9ff; }
    .sub-item.active { border-color: var(--accent); background: #fffbeb; }

    .sub-item-title  { font-weight: 600; font-size: 0.85rem; margin-bottom: 3px; line-height: 1.4; }
    .sub-item-meta   { font-size: 0.74rem; color: var(--muted); margin-bottom: 6px; }
    .sub-item-footer { display: flex; align-items: center; justify-content: space-between; }
    .sub-item-time   { font-size: 0.7rem; color: var(--muted); }

    /* Right panel — detail view */
    .detail-panel { padding: 20px; overflow-y: auto; }

    .detail-header { margin-bottom: 16px; }
    .detail-title  { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .detail-chips  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .detail-chip   {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; font-size: 0.72rem; font-weight: 600;
      color: var(--muted); padding: 2px 9px;
    }

    .checklist-card { margin-bottom: 14px; }

    .checklist { list-style: none; }
    .cl-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; font-size: 0.84rem;
      border-bottom: 1px solid var(--border);
    }
    .cl-item:last-child { border: none; }
    .cl-icon { font-size: 0.9rem; flex-shrink: 0; width: 20px; text-align: center; }
    .cl-ok   { color: var(--success); }
    .cl-warn { color: var(--warning); }
    .cl-fail { color: var(--danger);  }

    .ai-notice {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: var(--radius); padding: 12px 14px;
      font-size: 0.82rem; color: #1d4ed8; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .feedback-card { margin-bottom: 14px; }

    .action-row {
      display: flex; gap: 10px; justify-content: flex-end;
      padding-top: 14px; border-top: 1px solid var(--border);
    }

    /* Empty state when nothing selected */
    .empty-detail {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; color: var(--muted); text-align: center;
    }

    .empty-detail .icon { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand"><div class="nav-logo">i</div> Research Repository</div>
  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link active" href="review.html">Review Queue</a>
    <a class="nav-link" href="browse.html">Browse</a>
    <a class="nav-link" href="upload.html">Upload</a>
  </div>
  <div class="nav-right">
    <div class="avatar" id="avatarEl">JD</div>
    <span class="role-pill" id="rolePill">Librarian</span>
  </div>
</nav>

<div class="review-layout">

  <!-- LEFT: Submission list -->
  <div class="sub-panel">
    <div class="sub-panel-header">
      <h3>Submissions for Review</h3>

      <!-- Search -->
      <div class="search-wrap" style="margin-bottom:10px;">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search pending research...">
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterList('all',this)">
          All (<span id="cntAll">0</span>)
        </button>
        <button class="filter-tab" onclick="filterList('pending',this)">
          Pending (<span id="cntPending">0</span>)
        </button>
        <button class="filter-tab" onclick="filterList('returned',this)">
          Returned (<span id="cntReturned">0</span>)
        </button>
      </div>
    </div>

    <!-- Submission cards -->
    <div class="sub-list" id="subList"></div>
  </div>

  <!-- RIGHT: Detail view -->
  <div class="detail-panel" id="detailPanel">
    <div class="empty-detail">
      <div class="icon">📋</div>
      <p style="font-weight:600;margin-bottom:4px;">No submission selected</p>
      <p style="font-size:0.8rem;">Click a submission on the left to review it.</p>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toasts"></div>
<script src="js/api.js"></script>
<script src="js/review.js"></script>
</body>
</html>
